<!DOCTYPE html>
<html>
<head>
<title>Scholar Publications</title>
</head>

<body>

<h2>Publications</h2>
<ul id="pubList"></ul>

<script>
const scholarID = "kFjRx6gAAAAJ";
const proxy = "https://api.allorigins.win/raw?url=";

async function fetchScholar(start=0){
    
    const url = `https://scholar.google.com/citations?user=${scholarID}&hl=en&cstart=${start}&pagesize=20`;
    
    const response = await fetch(proxy + encodeURIComponent(url));
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const papers = doc.querySelectorAll(".gsc_a_tr");

    if(papers.length === 0) return false;

    papers.forEach(p => {

        const title = p.querySelector(".gsc_a_at")?.innerText || "";
        const authors = p.querySelector(".gs_gray")?.innerText || "";
        const year = p.querySelector(".gsc_a_y span")?.innerText || "";
        const cites = p.querySelector(".gsc_a_c span")?.innerText || "0";

        const li = document.createElement("li");
        li.textContent = `${title} (${year}) – ${authors}. Citations: ${cites}`;

        document.getElementById("pubList").appendChild(li);

    });

    return true;
}

async function loadAll(){

    let start = 0;

    while(true){

        const more = await fetchScholar(start);

        if(!more) break;

        start += 20;
    }
}

loadAll();
</script>

</body>
</html>
